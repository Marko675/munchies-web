<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect for GitHub Pages
    // Redirects all 404s back to index.html with the path as a query param
    var repo = '/munchies-web';
    var path = window.location.pathname;
    if (path.startsWith(repo)) {
      path = path.slice(repo.length);
    }
    window.location.replace(
      repo + '/?p=' + encodeURIComponent(path + window.location.search) + window.location.hash
    );
  </script>
</head>
</html>
